name: Drupal Contribution
ddev_version_constraint: '>= v1.25.0'

project_files:
  - fs-check.sh
  - config.ddev-drupal-contribution.yaml
  - commands/host/addrepo
  - commands/web/eslint
  - commands/web/nightwatch
  - commands/web/phpcbf
  - commands/web/phpcs
  - commands/web/phpstan
  - commands/web/phpunit
  - commands/web/stylelint

dependencies:
 - ddev/ddev-selenium-standalone-chrome

post_install_actions:
  - sh fs-check.sh
  - ddev composer require weitzman/drupal-test-traits
  - ddev exec -d /var/www/html/web/core yarn install
  - ddev exec -d /var/www/html/web/core touch .env

removal_actions:
  - rm fs-check.sh
  - rm config.ddev-drupal-core-contribution.yaml
  - rm commands/host/addrepo
  - rm commands/web/eslint
  - rm commands/web/nightwatch
  - rm commands/web/phpcbf
  - rm commands/web/phpcs
  - rm commands/web/phpstan
  - rm commands/web/phpunit
  - rm commands/web/stylelint
